name: Cenoteka price check

on:
  schedule:
    - cron: '0 7 * * *'  # Svaki dan u 7:00 UTC (9:00 po srpskom vremenu)
  workflow_dispatch:      # Omogućava ručno pokretanje

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Run price check
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RTDB_TOKEN: ${{ secrets.RTDB_TOKEN }}
          FAMILY_ID: ${{ secrets.FAMILY_ID }}
        run: node index.js
        working-directory: .github/scripts
